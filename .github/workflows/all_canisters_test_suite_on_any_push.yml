name: Canisters test suite run on any push except main
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run canister test suite
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use prebuilt devcontainer image and run canister test suite
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}-devcontainer
          push: never
          noCache: true
          env: |
            POCKET_IC_BIN=/workspaces/hot-or-not-backend-canister/pocket-ic
          runCmd: |
            echo "=== Filesystem Analysis ==="
            df -h | head -20
            echo ""
            echo "=== Mount points ==="
            mount | grep -E '(rustup|tmp|local)' || echo "No rustup/tmp/local mounts found"
            echo ""
            echo "=== /usr/local/rustup ==="
            df -h /usr/local/rustup 2>&1 || echo "Directory doesn't exist"
            echo ""
            echo "=== /usr/local/rustup/tmp ==="
            df -h /usr/local/rustup/tmp 2>&1 || echo "Directory doesn't exist"
            echo ""
            echo "=== /tmp ==="
            df -h /tmp
            echo ""
            echo "=== Attempting rustup update ==="
            rustup update 2>&1 || echo "Update failed"

name: Canisters test suite run on any push
on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run canister test suite
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dfx
        run: bash scripts/install-dfx.sh

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve pocket-ic path
        run: echo "POCKET_IC_BIN=$(dfx cache show)/pocket-ic" >> $GITHUB_ENV

      - name: Run canister test suite
        run: bash scripts/run_canister_test_suite.sh

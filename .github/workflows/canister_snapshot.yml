name: Canister Snapshot

on:
  # DISABLED: Daily snapshot at 2 AM UTC
  # schedule:
  #   - cron: '0 2 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      canister_id:
        description: 'Canister ID to snapshot'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - take_snapshot
          - list_snapshots
          - load_snapshot
      snapshot_id:
        description: 'Snapshot ID (only for load_snapshot action)'
        required: false
        type: string

jobs:
  snapshot:
    name: Canister Snapshot (${{ matrix.canister_id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        canister_id:
          - 'ivkka-7qaaa-aaaas-qbg3q-cai'
          - 'gxhc3-pqaaa-aaaas-qbh3q-cai'
    env:
      DFX_WARNING: -mainnet_plaintext_identity

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run snapshot action in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: bash scripts/ci/canister_snapshot.sh
          env: |
            HOT_OR_NOT_SNS_PROPOSAL_SUBMISSION_IDENTITY_PRIVATE_KEY=${{ secrets.HOT_OR_NOT_SNS_PROPOSAL_SUBMISSION_IDENTITY_PRIVATE_KEY }}
            CANISTER_ID=${{ inputs.canister_id || matrix.canister_id }}
            ACTION=${{ inputs.action || 'take_snapshot' }}
            SNAPSHOT_ID=${{ inputs.snapshot_id }}

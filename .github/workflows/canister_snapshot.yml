name: Canister Snapshot

on:
  # DISABLED: Daily snapshot at 2 AM UTC
  # schedule:
  #   - cron: '0 2 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      canister_id:
        description: 'Canister ID to snapshot'
        required: true
        type: string
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - take_snapshot
          - list_snapshots
          - load_snapshot
      snapshot_id:
        description: 'Snapshot ID (only for load_snapshot action)'
        required: false
        type: string

jobs:
  snapshot:
    name: Canister Snapshot (${{ matrix.canister_id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        canister_id:
          - 'ivkka-7qaaa-aaaas-qbg3q-cai'
          - 'gxhc3-pqaaa-aaaas-qbh3q-cai'
    env:
      DFX_WARNING: -mainnet_plaintext_identity

    steps:
      - name: Install dfx
        run: |
          DFXVM_INIT_YES=true sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

      - name: Setup identity
        run: |
          mkdir -p ~/.config/dfx/identity/admin
          echo "${{ secrets.HOT_OR_NOT_SNS_PROPOSAL_SUBMISSION_IDENTITY_PRIVATE_KEY }}" > ~/.config/dfx/identity/admin/identity.pem
          chmod 600 ~/.config/dfx/identity/admin/identity.pem
          $HOME/.local/share/dfx/bin/dfx identity use admin
          echo "Using principal: $($HOME/.local/share/dfx/bin/dfx identity get-principal)"

      - name: Set variables
        id: vars
        run: |
          # For manual triggers, use input; for scheduled runs, use matrix
          CANISTER_ID="${{ inputs.canister_id || matrix.canister_id }}"
          ACTION="${{ inputs.action || 'take_snapshot' }}"
          echo "canister_id=$CANISTER_ID" >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "Using canister_id: $CANISTER_ID"
          echo "Using action: $ACTION"

      - name: List snapshots
        if: ${{ steps.vars.outputs.action == 'list_snapshots' }}
        run: |
          $HOME/.local/share/dfx/bin/dfx canister --network ic snapshot list ${{ steps.vars.outputs.canister_id }}

      - name: Take snapshot
        if: ${{ steps.vars.outputs.action == 'take_snapshot' }}
        run: |
          CANISTER_ID="${{ steps.vars.outputs.canister_id }}"
          DFX="$HOME/.local/share/dfx/bin/dfx"
          MAX_SNAPSHOTS=10

          echo "Checking existing snapshots..."
          SNAPSHOTS=$($DFX canister --network ic snapshot list $CANISTER_ID 2>/dev/null || echo "")

          # Extract snapshot IDs (format: snapshot_id: <id>)
          SNAPSHOT_IDS=($(echo "$SNAPSHOTS" | grep -oP '(?<=snapshot_id: )[a-f0-9]+' || true))
          SNAPSHOT_COUNT=${#SNAPSHOT_IDS[@]}

          echo "Found $SNAPSHOT_COUNT existing snapshots (max: $MAX_SNAPSHOTS)"

          # If at max capacity, delete oldest snapshot(s) to make room
          if [ "$SNAPSHOT_COUNT" -ge "$MAX_SNAPSHOTS" ]; then
            # Delete oldest snapshot (first in list)
            OLDEST_SNAPSHOT="${SNAPSHOT_IDS[0]}"
            echo "At max capacity. Deleting oldest snapshot: $OLDEST_SNAPSHOT"
            $DFX canister --network ic snapshot delete $CANISTER_ID $OLDEST_SNAPSHOT
          fi

          echo "Stopping canister $CANISTER_ID..."
          $DFX canister --network ic stop $CANISTER_ID

          echo "Taking snapshot..."
          $DFX canister --network ic snapshot create $CANISTER_ID

          echo "Starting canister..."
          $DFX canister --network ic start $CANISTER_ID

          echo "Listing snapshots..."
          $DFX canister --network ic snapshot list $CANISTER_ID

      - name: Load snapshot
        if: ${{ steps.vars.outputs.action == 'load_snapshot' }}
        run: |
          if [ -z "${{ inputs.snapshot_id }}" ]; then
            echo "Error: snapshot_id is required for load_snapshot action"
            exit 1
          fi

          echo "Stopping canister ${{ steps.vars.outputs.canister_id }}..."
          $HOME/.local/share/dfx/bin/dfx canister --network ic stop ${{ steps.vars.outputs.canister_id }}

          echo "Loading snapshot ${{ inputs.snapshot_id }}..."
          $HOME/.local/share/dfx/bin/dfx canister --network ic snapshot load ${{ steps.vars.outputs.canister_id }} ${{ inputs.snapshot_id }}

          echo "Starting canister..."
          $HOME/.local/share/dfx/bin/dfx canister --network ic start ${{ steps.vars.outputs.canister_id }}

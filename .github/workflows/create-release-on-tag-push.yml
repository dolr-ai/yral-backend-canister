name: Release and submit proposal
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Publish canister artifacts and send upgrade proposals
    runs-on: macos-latest
    permissions:
      packages: read
      contents: write
    env:
      NEURON_ID: 4de673e9cd7a1339afea6523a5f227d25e9d739ff52635ac86dbdb0447ae106a

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bash scripts/install-dependencies.sh

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download quill (macOS)
        run: |
          curl -L -o quill \
            https://github.com/dfinity/quill/releases/download/v0.4.2/quill-macos-x86_64
          chmod +x quill

      - name: Download ic-repl (macOS)
        run: |
          ICREPL_VERSION=$(curl -s https://api.github.com/repos/dfinity/ic-repl/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -L -o ic-repl-linux64 \
            "https://github.com/dfinity/ic-repl/releases/download/${ICREPL_VERSION}/ic-repl-macos"
          chmod +x ic-repl-linux64

      - name: Run release workflow
        run: bash scripts/release-and-submit-proposals.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOT_OR_NOT_SNS_PROPOSAL_SUBMISSION_IDENTITY_PRIVATE_KEY: ${{ secrets.HOT_OR_NOT_SNS_PROPOSAL_SUBMISSION_IDENTITY_PRIVATE_KEY }}
          VERSION: ${{ github.ref_name }}
          NEURON_ID: ${{ env.NEURON_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}

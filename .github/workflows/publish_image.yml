name: Deploy to ghcr.io

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  docker_publish:
    runs-on: "ubuntu-20.04"
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build and publish docker image in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: bash scripts/publish_image.sh
          env: |
            IMAGE_NAME=ghcr.io/yral-dapp/yral-backend-dev
            IMAGE_TAG=${{ github.sha }}
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
